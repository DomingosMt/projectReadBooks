<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <title>ReadBooks</title>
  </head>

  <body class="h-screen overflow-hidden">
    <main class="h-screen flex">
      <div class="relative w-1/2 bg-[url('./assets/livros2.jpg')] bg-cover bg-center bg-repeat ">
        <div
          class="absolute w-full h-screen bg-linear-to-b from-[#44444428] to-black backdrop-blur-[1.5px]"
        ></div>
        <div class="absolute left-8 top-10 max-w-sm text-white">
          <h1 class="mt-5 text-6xl font-semibold leading-none tracking-tight text-white drop-shadow-lg">
            ReadBook
          </h1>
          <div class="mt-4 h-1 w-20 rounded-full bg-[#006970]"></div>
          <p class="mt-4 max-w-xs text-sm leading-6 text-white/80">
            Uma estante digital elegante, feita para ler, organizar e voltar aos seus livros com calma.
          </p>
        </div>
      </div>

      <div class="flex flex-col items-center pt-20 w-1/2 h-screen">
        <div class="bg-[#e7e8e9] w-[58% auto] p-1 mt-[-30px] mb-5 rounded-md">
          <button
            id="btn-login"
            class="bg-[#006970] text-white px-15 py-2 rounded-lg"
          >
            Login
          </button>
          <button id="btn-cadastro" class="px-15 py-2 rounded-lg">
            Criar conta
          </button>
        </div>
        <div id="title-form" class="w-[70%]">
          <h2 class="text-2xl pt-3">Iniciar sessão</h2>
          <p>Insira seus dados para acessar sua estante.</p>
        </div>
        <form
          onsubmit="handleLogin(event)"
          id="form-login"
          class="py-5 w-[70%]"
        >
          <div>
            <label for="email">Email</label>
            <input
              placeholder="email@readbooks.com"
              type="email"
              name="email"
              id="emailLogin"
              class="w-full border border-[#d9d9db] rounded-md p-2 mt-2"
            />
          </div>

          <div id="div-senha">
            <label for="senha">Senha</label>
            <input
              placeholder="....."
              type="password"
              name="senha"
              id="senhaLogin"
              class="w-full border border-[#d9d9db] rounded-md p-2 mt-2"
            />
          </div>

          <div class="flex justify-between mt-3">
            <div>
              <input type="checkbox"/>
              <label for="">Mantenha-se logado.</label>
            </div>
            <a href="/esqueceu-senha">Esqueceu a senha?</a>
          </div>
          <button
            type="submit"
            class="bg-[#006970] px-15 py-2 rounded-lg w-full text-white mt-5 cursor-pointer"
          >
            Entrar
          </button>
        </form>

        <form
          onsubmit="handleCadastro(event)"
          id="form-cadastro"
          class="hidden py-5 w-[70%]"
        >
          <div>
            <label for="nome">Nome</label>
            <input
              placeholder="Digite o seu nome completo"
              type="text"
              name="nome"
              id="nome"
              class="w-full border border-[#d9d9db] rounded-md p-2 mt-2"
            />
          </div>

          <div>
            <label for="email">Email</label>
            <input
              placeholder="Digite o seu email"
              type="email"
              name="email"
              id="emailCadastro"
              class="w-full border border-[#d9d9db] rounded-md p-2 mt-2"
            />
          </div>

          <div>
            <label for="senha">Senha</label>
            <div class="flex relative">
                <input
                  placeholder="Crie a sua senha"
                  type="password"
                  name="senha"
                  id="senhaCadastro"
                  class="w-full border border-[#d9d9db] rounded-md p-2 mt-2"
                />
                <button id="btn-revealed" class="absolute bottom-4.5 top-4.5 right-3 cursor-pointer">
                    <i class="ph ph-eye"></i>
                </button>
                <button id="btn-hidden" class="absolute bottom-4.5 top-4.5 right-3 hidden cursor-pointer">
                    <i class="ph ph-eye-slash"></i>
                </button>
            </div>
          </div>

          <div>
            <label for="data">Data de Nascimento</label>
            <input
              placeholder=""
              type="date"
              name="date"
              id="dataNascimento"
              class="w-full border border-[#d9d9db] rounded-md p-2 mt-2 cursor-pointer"
            />
          </div>

          <div class="flex gap-2 mt-4">
            <input type="checkbox"/>
            <label
              >Ao clicar nesta caixa, você está concordando com nossos
              <a href="#" class="no-underline hover:underline">termos de uso</a
              >.</label
            >
          </div>

          <button
            type="submit"
            class="bg-[#006970] px-15 py-2 rounded-lg w-full text-white mt-5 cursor-pointer"
          >
            Cadastrar
          </button>
        </form>
        <p class="text-center mt-auto mb-4">
          &copy; Todos os direitos reservados. 2026
        </p>
      </div>
    </main>

    <script src="index.js"></script>
  </body>
</html>
